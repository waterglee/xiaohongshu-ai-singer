<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书音乐翻唱笔记生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #fff9f9;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            color: #ff2442;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #ff2442;
        }

        .generate-btn {
            width: 100%;
            background: #ff2442;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0 20px;
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-box {
            background: #fdf6f7;
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .result-title {
            color: #ff2442;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .copy-btn {
            background: #fff;
            border: 1px solid #ff2442;
            color: #ff2442;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="title">🎤 小红书音乐翻唱笔记生成器</h2>

        <div class="form-item">
            <label>歌曲名称</label>
            <input type="text" id="song" placeholder="例如：突然想爱你">
        </div>

        <div class="form-item">
            <label>翻唱风格</label>
            <input type="text" id="style" placeholder="例如：温柔治愈/深情/甜妹">
        </div>

        <div class="form-item">
            <label>你的翻唱亮点（可选）</label>
            <textarea id="point" rows="2" placeholder="例如：低音改编/清唱/治愈女声"></textarea>
        </div>

        <button class="generate-btn" onclick="generateNote()">立即生成笔记</button>

        <div id="result" style="display: none;">
            <div class="result-box">
                <div class="result-title">
                    爆款标题
                    <button class="copy-btn" onclick="copyContent('titleContent')">复制</button>
                </div>
                <div id="titleContent"></div>
            </div>

            <div class="result-box">
                <div class="result-title">
                    笔记正文
                    <button class="copy-btn" onclick="copyContent('textContent')">复制</button>
                </div>
                <div id="textContent"></div>
            </div>

            <div class="result-box">
                <div class="result-title">
                    热门标签
                    <button class="copy-btn" onclick="copyContent('tagContent')">复制</button>
                </div>
                <div id="tagContent"></div>
            </div>

            <div class="result-box">
                <div class="result-title">
                    短视频口播脚本
                    <button class="copy-btn" onclick="copyContent('scriptContent')">复制</button>
                </div>
                <div id="scriptContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ===================== 已100%填好你的信息 =====================
        const DOUBAO_API_KEY = "ark-3be4aa0c-7db3-4d6c-90fb-6ea60e5be058-565d7";
        const DOUBAO_MODEL_ID = "ep-20260418010532-4299z";
        // =============================================================

        async function generateNote() {
            const song = document.getElementById("song").value.trim();
            const style = document.getElementById("style").value.trim();
            const point = document.getElementById("point").value.trim() || "无特殊亮点";

            if (!song || !style) {
                alert("请填写歌曲名称和翻唱风格！");
                return;
            }

            const btn = document.querySelector(".generate-btn");
            btn.disabled = true;
            btn.innerText = "生成中...";

            const prompt = `
你是小红书音乐翻唱爆款文案专家，严格按要求生成内容：
输入：歌曲《${song}》，风格${style}，亮点：${point}，身份：业余翻唱爱好者

请输出：
1. 3个带emoji的爆款标题（小红书算法友好）
2. 150-200字正文（真实、有情绪、不营销）
3. 5个高流量音乐垂类标签
4. 15秒短视频口播脚本（开头抓耳）

格式清晰，不要多余解释。
            `;

            try {
                const response = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${DOUBAO_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: DOUBAO_MODEL_ID,
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const result = data.choices[0].message.content;
                showResult(result);

            } catch (err) {
                alert("生成失败，请检查网络或API配置！\n错误：" + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "立即生成笔记";
            }
        }

        function showResult(text) {
            document.getElementById("result").style.display = "block";
            const lines = text.split("\n").filter(item => item.trim());

            let title = "", textContent = "", tags = "", script = "";
            let part = 0;

            lines.forEach(line => {
                if (line.includes("标题")) { part = 1; return; }
                if (line.includes("正文")) { part = 2; return; }
                if (line.includes("标签")) { part = 3; return; }
                if (line.includes("脚本") || line.includes("口播")) { part = 4; return; }

                if (part === 1) title += line + "<br>";
                if (part === 2) textContent += line + "<br>";
                if (part === 3) tags += line + "<br>";
                if (part === 4) script += line + "<br>";
            });

            document.getElementById("titleContent").innerHTML = title;
            document.getElementById("textContent").innerHTML = textContent;
            document.getElementById("tagContent").innerHTML = tags;
            document.getElementById("scriptContent").innerHTML = script;
        }

        function copyContent(id) {
            const content = document.getElementById(id).innerText;
            navigator.clipboard.writeText(content).then(() => {
                alert("复制成功！");
            });
        }
    </script>
</body>
</html>
