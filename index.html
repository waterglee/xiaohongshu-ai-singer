<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书翻唱背景视频生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #fff9f9;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            color: #ff2442;
            font-size: 22px;
            margin-bottom: 24px;
            font-weight: bold;
        }

        .form-item {
            margin-bottom: 18px;
        }

        .form-item label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ff2442;
        }

        .generate-btn {
            width: 100%;
            background: #ff2442;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0 20px;
            cursor: pointer;
        }

        .generate-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #fdf6f7;
            border-radius: 10px;
            display: none;
        }

        .result-title {
            color: #ff2442;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .copy-btn {
            background: white;
            color: #ff2442;
            border: 1px solid #ff2442;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 12px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .tips {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🎬 小红书翻唱背景视频生成器</div>

        <!-- 歌曲信息 -->
        <div class="form-item">
            <label>歌曲名称</label>
            <input type="text" id="song" placeholder="例如：忽然之间">
        </div>

        <div class="form-item">
            <label>翻唱风格</label>
            <select id="styleSelect">
                <option value="calm">温柔治愈</option>
                <option value="sad">伤感氛围</option>
                <option value="cute">元气甜妹</option>
            </select>
        </div>

        <!-- 音频上传 -->
        <div class="form-item">
            <label>上传你的翻唱音频</label>
            <input type="file" id="audioFile" accept="audio/*">
        </div>

        <!-- 生成按钮 -->
        <button class="generate-btn" onclick="startCreate()" id="createBtn">开始生成视频+文案</button>

        <!-- 视频预览 -->
        <div class="result-box" id="videoResult">
            <div class="result-title">视频预览</div>
            <video id="previewVideo" controls></video>
            <button class="copy-btn" onclick="downloadVideo()">下载视频到本地</button>
        </div>

        <!-- 文案结果 -->
        <div class="result-box" id="textResult">
            <div class="result-title">小红书文案</div>
            <div id="captionContent"></div>
            <button class="copy-btn" onclick="copyText()">一键复制文案</button>
        </div>

        <div class="tips">
            提示：生成需要5-10秒，请耐心等待<br>
            视频可直接发布小红书！
        </div>
    </div>

    <script>
        // 你的API信息
        const DOUBAO_API_KEY = "ark-3be4aa0c-7db3-4d6c-90fb-6ea60e5be058-565d7";
        const DOUBAO_MODEL_ID = "ep-20260418010532-4299z";

        // 风格对应背景视频（Demo使用免费示例视频）
        const STYLE_VIDEO = {
            calm: "https://assets.mixkit.co/videos/preview/mixkit-soft-light-particles-on-black-background-1298-large.mp4",
            sad: "https://assets.mixkit.co/videos/preview/mixkit-rain-falling-on-the-water-of-a-lake-or-sea-4015-large.mp4",
            cute: "https://assets.mixkit.co/videos/preview/mixkit-pink-flower-field-breeze-1299-large.mp4"
        };

        const { FFmpeg } = FFmpegWASM;
        const ffmpeg = new FFmpeg();
        let ffmpegLoaded = false;

        // 加载FFmpeg
        (async () => {
            await ffmpeg.load();
            ffmpegLoaded = true;
        })();

        // 主函数：生成视频 + 文案
        async function startCreate() {
            const btn = document.getElementById("createBtn");
            btn.disabled = true;
            btn.innerText = "正在生成中...";

            const song = document.getElementById("song").value;
            const audioFile = document.getElementById("audioFile").files[0];
            
            if (!song || !audioFile) {
                alert("请填写歌曲名并上传音频！");
                btn.disabled = false;
                btn.innerText = "开始生成视频+文案";
                return;
            }

            try {
                // 1. 生成视频
                await createVideo();
                // 2. 生成文案
                await generateCaption();
            } catch (e) {
                console.error(e);
                alert("生成失败：" + e.message);
            }

            btn.disabled = false;
            btn.innerText = "开始生成视频+文案";
        }

        // 视频合成核心
        async function createVideo() {
            if (!ffmpegLoaded) {
                alert("正在加载引擎，请稍候...");
                return;
            }

            const style = document.getElementById("styleSelect").value;
            const audioFile = document.getElementById("audioFile").files[0];
            const bgUrl = STYLE_VIDEO[style];

            // 下载背景视频
            const bgResponse = await fetch(bgUrl);
            const bgBlob = await bgResponse.blob();

            // 写入文件
            await ffmpeg.writeFile("bg.mp4", new Uint8Array(await bgBlob.arrayBuffer()));
            await ffmpeg.writeFile("audio.mp3", new Uint8Array(await audioFile.arrayBuffer()));

            // 合成命令
            await ffmpeg.run(
                "-i", "bg.mp4",
                "-i", "audio.mp3",
                "-c:v", "copy",
                "-c:a", "aac",
                "-map", "0:v:0",
                "-map", "1:a:0",
                "-shortest",
                "output.mp4"
            );

            // 获取结果
            const data = await ffmpeg.readFile("output.mp4");
            const videoBlob = new Blob([data.buffer], { type: "video/mp4" });
            const videoUrl = URL.createObjectURL(videoBlob);

            // 显示视频
            const videoEl = document.getElementById("previewVideo");
            videoEl.src = videoUrl;
            document.getElementById("videoResult").style.display = "block";
        }

        // 生成小红书文案
        async function generateCaption() {
            const song = document.getElementById("song").value;
            const style = document.getElementById("styleSelect").value;

            const prompt = `
你是小红书音乐博主，为翻唱视频写文案：
歌曲名：《${song}》
风格：${style}
要求：
1. 标题吸引人
2. 正文有情绪、有共鸣
3. 带热门标签
直接输出文案，不要多余内容。`;

            try {
                const res = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + DOUBAO_API_KEY
                    },
                    body: JSON.stringify({
                        model: DOUBAO_MODEL_ID,
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                const content = data.choices[0].message.content;
                document.getElementById("captionContent").innerText = content;
                document.getElementById("textResult").style.display = "block";
            } catch (e) {
                document.getElementById("captionContent").innerText = "文案生成失败，可手动编写~";
                document.getElementById("textResult").style.display = "block";
            }
        }

        // 下载视频
        function downloadVideo() {
            const url = document.getElementById("previewVideo").src;
            const a = document.createElement("a");
            a.href = url;
            a.download = "小红书翻唱视频.mp4";
            a.click();
        }

        // 复制文案
        function copyText() {
            const text = document.getElementById("captionContent").innerText;
            navigator.clipboard.writeText(text);
            alert("复制成功！");
        }
    </script>
</body>
</html>
